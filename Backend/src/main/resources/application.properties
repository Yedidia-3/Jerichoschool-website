# =============================================
# DATABASE CONFIGURATION
# =============================================
# Use environment variables in production (Railway sets these automatically).
# The fallback values (after the colon) are used for local development.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/school_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# =============================================
# SERVER
# =============================================
server.port=${PORT:8080}

# =============================================
# JACKSON - Serialize dates as ISO strings
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

